<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Encryption Simulator</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Header Area -->
    <header>
        <div class="logo">
            <i class="fa-solid fa-shield-halved logo-icon"></i>
            <h1>Network Encryption Simulator</h1>
        </div>
        <p class="subtitle">Computer Networks Project Simulation</p>
    </header>

    <!-- Main App Container -->
    <div class="container">
        
        <!-- LEFT PANEL: Crypto Steps -->
        <div class="panel" id="left-panel">
            <h2><i class="fa-solid fa-list-check"></i> Math / Crypto Steps</h2>
            <div id="steps-output" class="steps-container" style="flex: 1; overflow-y: auto;">
                <div class="step-card" style="opacity: 1; transform: translateX(0);">
                    <div class="step-card-header"><i class="fa-solid fa-info-circle"></i> Awaiting Input</div>
                    <div class="step-card-body">Math calculations and algorithmic processes will appear here in detailed cards.</div>
                </div>
            </div>
        </div>

        <!-- CENTER PANEL: Character Transformation Strip -->
        <div class="panel" style="padding-top: 1.5rem; overflow-y: auto;">
            <h2 style="margin-bottom: 2rem;"><i class="fa-solid fa-wand-magic-sparkles"></i> Character Transformation</h2>
            
            <div id="flow-bar" class="flow-bar" style="text-align: center; font-size: 1.5rem; font-weight: bold; margin-bottom: 2rem; color: var(--accent); opacity: 0; transition: opacity 0.5s;">
            </div>

            <div id="char-strip" class="char-strip" style="display: flex; flex-direction: column; gap: 1rem; align-items: center; justify-content: center; overflow-x: auto; padding: 1rem;">
            </div>

            <div id="crypto-status" style="margin-top: 3rem; padding: 1rem 2rem; background: rgba(0,0,0,0.2); border: 1px dashed var(--border-color); border-radius: 8px; color: var(--text-secondary); text-align: center; min-width: 300px;">
                Ready for encryption sequence...
            </div>
        </div>

        <!-- RIGHT PANEL: Inputs & Outputs -->
        <div class="panel">
            <h2><i class="fa-solid fa-terminal"></i> Configuration</h2>
            
            <form id="sim-form">

                <div class="form-group">
                    <label for="algorithm"><i class="fa-solid fa-microchip"></i> Select Algorithm</label>
                    <select id="algorithm" required>
                        <option value="" disabled selected>-- Choose --</option>
                        <option value="caesar">Caesar Cipher (Substitution)</option>
                        <option value="vigenere">Vigenère Cipher (Polyalphabetic)</option>
                        <option value="aes">AES-256 (Symmetric Block)</option>
                        <option value="rsa">RSA-2048 (Asymmetric Public Key)</option>
                        <option value="sha256">SHA-256 (Cryptographic Hash)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="plaintext"><i class="fa-regular fa-file-lines"></i> Input Message</label>
                    <textarea id="plaintext" placeholder="Type the message to send..." required></textarea>
                </div>

                <div class="form-group hidden" id="key-group">
                    <label for="key" id="key-label"><i class="fa-solid fa-key"></i> Key</label>
                    <input type="text" id="key" placeholder="Enter key...">
                </div>

                <button type="submit" class="btn" id="run-btn">
                    <i class="fa-solid fa-play"></i> <span id="btn-text">Run Simulation</span>
                </button>
            </form>

            <h2 style="margin-top: 2rem;"><i class="fa-solid fa-box-open"></i> Results</h2>
            
            <div class="form-group">
                <label>Encrypted / Hashed Form (Transit Data)</label>
                <textarea id="encrypted-output" class="readonly-field" readonly placeholder="Calculated output will appear here..."></textarea>
            </div>

            <div class="form-group" id="decrypt-group">
                <label>Decrypted Result (at Receiver)</label>
                <textarea id="decrypted-output" class="readonly-field" readonly placeholder="Recovered text will appear here..."></textarea>
            </div>
            
        </div>

    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
